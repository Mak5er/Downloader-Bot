name: Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  BOT_TOKEN: "123456:TESTTOKEN"
  ADMIN_ID: "1"
  CUSTOM_API_URL: "https://api.example.com"
  CHANNEL_ID: "-1001234567890"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/downloader_bot_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=. --cov-report=term-missing:skip-covered --cov-report=xml --junitxml=pytest.xml

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: pytest-results
          path: |
            coverage.xml
            pytest.xml

  docker-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/downloader_bot_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t downloader-bot:test .

      - name: Smoke-test container imports
        run: |
          docker run --rm \
            -e BOT_TOKEN \
            -e DATABASE_URL \
            -e ADMIN_ID \
            -e CUSTOM_API_URL \
            -e CHANNEL_ID \
            --entrypoint python \
            downloader-bot:test \
            -c "import handlers; from services.logger import summarize_text_for_log; print(summarize_text_for_log('https://example.com/demo'))"

  postgres-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: downloader_bot_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d downloader_bot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      RUN_DB_TESTS: "1"
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/downloader_bot_test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run PostgreSQL integration tests
        run: |
          pytest tests/test_db.py -q
