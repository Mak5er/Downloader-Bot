name: Daily Platform Canary Check

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  canary-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp -r requirements.txt

      - name: Run platform canary checks
        run: python scripts/canary_test.py
